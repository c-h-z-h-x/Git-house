<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复习资料助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    width: 640px;
    max-width: 96vw;
    height: 86vh;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 18px 24px;
    border-bottom: 1px solid #eee;
    background: #fff;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #1a1a2e; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .msg { margin-bottom: 16px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.bot { justify-content: flex-start; }
  .bubble {
    max-width: 80%;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #f0f2f5;
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
  }
  .msg.bot .bubble.loading { color: #999; font-style: italic; }
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    background: #fff;
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border .2s;
  }
  .input-area input:focus { border-color: #1a73e8; }
  .input-area button {
    padding: 10px 20px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s;
  }
  .input-area button:hover { background: #1557b0; }
  .input-area button:disabled { background: #aaa; cursor: not-allowed; }
  .hint {
    text-align: center;
    padding: 8px 24px;
    font-size: 12px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 复习资料助手</h1>
    <p>搜索文档 · 打包下载 · 随问随答</p>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bubble">你好！有什么需要帮忙的吗？<br>例如：<br>• 搜一下微积分的资料<br>• 打包人工智能导引</div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入你的问题…" autofocus>
    <button id="sendBtn">发送</button>
  </div>
  <div class="hint">按 Enter 发送 &nbsp;·&nbsp; 支持搜索文档与打包下载</div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let ws = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    removeLoading();
    addMsg('bot', data.reply);
  };
  ws.onclose = () => setTimeout(connect, 1000);
}
connect();

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function linkify(text) {
  let html = escapeHtml(text);
  // 把 /download/xxx.zip 转为可点击的下载按钮（同源请求，直接用 download 属性）
  html = html.replace(/\/download\/[\w.-]+/g, function(match) {
    const filename = match.replace('/download/', '');
    return `<a href="${match}" download style="display:inline-block;margin:4px 0;padding:6px 14px;background:#1a73e8;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;cursor:pointer;">📥 下载 ${escapeHtml(filename)}</a>`;
  });
  return html;
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = linkify(text);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeLoading() {
  const loading = messages.querySelector('.msg.bot:last-child .bubble.loading');
  if (loading) loading.closest('.msg').remove();
}

function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  addMsg('bot', '…');
  sendBtn.disabled = true;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ query: text }));
  }
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
sendBtn.addEventListener('click', send);
</script>
</body>
</html>
