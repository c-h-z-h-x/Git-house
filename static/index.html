<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>穹途末路</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
  /* ── Reset & Theme ── */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bark:#493b1c;
    --sage:#75a08f;
    --cream:#dee1ce;
    --umber:#7f6649;
    --sage-light:color-mix(in oklch,var(--sage) 20%,#fff);
    --sage-dark:color-mix(in oklch,var(--sage) 80%,#000);
    --cream-light:#f5f4ec;
    --cream-dark:#c8ccb8;
    --surface:var(--cream);
    --sidebar:var(--cream);
    --border:var(--cream-dark);
    --text:var(--bark);
    --text-secondary:var(--bark);
    --text-muted:color-mix(in oklch,var(--umber) 60%,#fff);
    --success:color-mix(in oklch,var(--sage) 70%,#2d6);
    --error:oklch(60% 0.18 25);
    --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 12px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
    --shadow-lg:0 8px 30px rgba(0,0,0,.08),0 3px 8px rgba(0,0,0,.04);
    --shadow-raise:0 6px 20px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.06);
    --radius:12px;
    --radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      /* 暗色模式沿用浅色配色 */
    }
  }

  /* ── Layout ── */
  .app{display:flex;height:100vh;height:100dvh;max-width:1440px;margin:0 auto;padding:8px;gap:8px}
  @media(max-width:900px){.app{padding:0;gap:0}}

  /* ── Sidebar ── */
  .sidebar{
    width:240px;flex-shrink:0;
    background:var(--sidebar);border-radius:var(--radius);box-shadow:var(--shadow-sm);
    display:flex;flex-direction:column;padding:20px 12px 16px;
    border:1px solid var(--border);
  }
  @media(max-width:900px){.sidebar{display:none}}
  .sidebar-brand{
    font-size:15px;font-weight:650;padding:8px 12px 16px;margin:0 0 8px;
    display:flex;align-items:center;gap:10px;color:var(--text);
    letter-spacing:-.01em;border-bottom:1px solid var(--border);
  }
  .sidebar-brand svg{width:22px;height:22px;color:var(--sage);flex-shrink:0}
  .sidebar-nav{display:flex;flex-direction:column;gap:3px;flex:1;padding-top:4px}
  .sidebar-nav button{
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    border:none;border-radius:var(--radius-sm);
    background:transparent;color:var(--text-secondary);
    font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
    text-align:left;width:100%;
  }
  .sidebar-nav button:hover{background:color-mix(in oklch,var(--sage) 10%,transparent);color:var(--text)}
  .sidebar-nav button.active{background:color-mix(in oklch,var(--sage) 15%,transparent);color:var(--sage);font-weight:600}
  .sidebar-nav button svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
  .sidebar-nav button.active svg{opacity:1;color:var(--sage)}
  .sidebar-footer{
    border-top:1px solid var(--border);padding-top:12px;margin-top:auto;
    font-size:11px;color:var(--text-muted);padding:12px 12px 4px;line-height:1.5;
  }
  .sidebar-footer .dot-wrap{display:flex;align-items:center;gap:6px;margin-bottom:4px}

  /* ── Status dot ── */
  .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);display:inline-block;flex-shrink:0}
  .dot.off{background:var(--error);opacity:.5}
  .dot.loading{animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* ── Main Panel ── */
  .main{
    flex:1;display:flex;flex-direction:column;
    background:var(--surface);border-radius:var(--radius);
    border:1px solid var(--border);overflow:hidden;min-width:0;
    box-shadow:var(--shadow-md);
  }

  /* ── Chat Header ── */
  .chat-header{
    padding:16px 24px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .chat-header h1{
    font-size:16px;font-weight:650;color:var(--text);
    display:flex;align-items:center;gap:10px;letter-spacing:-.01em;
  }
  .chat-header h1 svg{width:20px;height:20px;color:var(--sage)}
  .chat-header .meta{font-size:12px;color:var(--text-muted)}

  /* ── Messages ── */
  .messages{flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .msg{margin-bottom:16px;display:flex}
  .msg.user{justify-content:flex-end}
  .msg.bot{justify-content:flex-start}
  .bubble{
    max-width:72%;padding:14px 20px;border-radius:var(--radius);
    font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;
    animation:in .25s ease-out;
  }
  .msg.user .bubble{
    background:var(--sage);color:#fff;
    border-bottom-right-radius:4px;
    box-shadow:var(--shadow-sm);
  }
  .msg.bot .bubble{
    background:var(--cream-light);color:var(--text);
    border-bottom-left-radius:4px;
    box-shadow:var(--shadow-sm);
  }
  .msg.bot .bubble.loading{color:var(--text-muted);font-style:italic}
  @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg .bubble a[download]{font-weight:600}
  .msg .bubble a[download]:hover{filter:brightness(.9)}

  /* ── Input ── */
  .chat-input-area{
    padding:16px 24px 20px;border-top:1px solid var(--border);
    display:flex;gap:8px;flex-shrink:0;
  }
  .chat-input-area input{
    flex:1;padding:12px 16px;
    border:1px solid var(--border);border-radius:var(--radius-sm);
    font-size:15px;outline:none;transition:border .2s,box-shadow .2s;
    background:var(--surface);color:var(--text);
  }
  .chat-input-area input:focus{border-color:var(--sage);box-shadow:0 0 0 3px color-mix(in oklch,var(--sage) 15%,transparent)}
  .chat-input-area input::placeholder{color:var(--text-muted)}
  .chat-input-area button{
    padding:12px 28px;
    background:var(--sage);color:#fff;
    border:none;border-radius:var(--radius-sm);
    font-size:15px;font-weight:500;cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:all .15s;
  }
  .chat-input-area button:hover{background:var(--sage-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .chat-input-area button:active{transform:translateY(0) scale(.97);box-shadow:var(--shadow-sm)}
  .chat-input-area button:disabled{opacity:.4;cursor:not-allowed}
  .chat-hint{text-align:center;padding:0 24px 12px;font-size:11px;color:var(--text-muted);flex-shrink:0}

  /* ── Panels ── */
  .panels{flex:1;display:flex;overflow:hidden;position:relative}
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;
    transition:opacity .2s,transform .2s;opacity:0;transform:translateX(16px);pointer-events:none}
  .panel.active{opacity:1;transform:translateX(0);pointer-events:auto}

  /* ── Exercise ── */
  .exercise-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .exercise-header{padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
  .exercise-header h2{
    font-size:16px;font-weight:650;color:var(--text);
    display:flex;align-items:center;gap:8px;letter-spacing:-.01em;
  }
  .exercise-header h2 svg{width:18px;height:18px;color:var(--sage)}
  .exercise-header .src{font-size:12px;color:var(--text-muted);margin-top:2px}
  .exercise-body{flex:1;overflow-y:auto;padding:16px 24px}
  .exercise-body::-webkit-scrollbar{width:4px}
  .exercise-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .eq-wrap{
    background:var(--cream-light);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;
    box-shadow:var(--shadow-sm);
    animation:in .25s ease-out both;
  }
  .eq-wrap:nth-child(1){animation-delay:0s}
  .eq-wrap:nth-child(2){animation-delay:.03s}
  .eq-wrap:nth-child(3){animation-delay:.06s}
  .eq-wrap.correct{border-color:var(--success);background:color-mix(in oklch,var(--sage) 8%,var(--cream-light))}
  .eq-wrap.wrong{border-color:var(--error);background:color-mix(in oklch,var(--error) 8%,var(--cream-light))}
  .eq-num{
    display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;
    border-radius:50%;background:var(--sage);color:#fff;
    font-size:12px;font-weight:700;margin-right:10px;vertical-align:middle;flex-shrink:0;
  }
  .eq-text{font-size:15px;line-height:1.6;color:var(--text)}
  .eq-text .blank-highlight{
    display:inline-block;min-width:80px;
    border-bottom:2px dashed var(--sage);color:var(--sage);
    font-weight:700;text-align:center;padding:0 4px;
  }
  .eq-text .blank-filled{border-bottom-color:var(--success);color:var(--success)}
  .eq-text .blank-wrong{border-bottom-color:var(--error);color:var(--error)}
  .eq-answer-row{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .eq-answer-row input{
    flex:1;min-width:120px;padding:10px 12px;border:1px solid var(--border);
    border-radius:6px;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;
    background:var(--surface);color:var(--text);
  }
  .eq-answer-row input:focus{border-color:var(--sage);box-shadow:0 0 0 3px color-mix(in oklch,var(--sage) 12%,transparent)}
  .eq-answer-row input:disabled{opacity:.5}
  .eq-answer-row .result-tag{
    font-size:12px;font-weight:700;white-space:nowrap;padding:4px 10px;border-radius:6px;
    display:inline-flex;align-items:center;gap:4px;
  }
  .eq-answer-row .result-tag svg{width:14px;height:14px}
  .eq-answer-row .result-tag.correct{color:color-mix(in oklch,var(--sage) 80%,#000);background:color-mix(in oklch,var(--sage) 12%,transparent)}
  .eq-answer-row .result-tag.wrong{color:var(--error);background:color-mix(in oklch,var(--error) 10%,transparent)}
  .eq-answer-row .correct-answer{font-size:12px;color:var(--text-muted)}
  .exercise-footer{
    padding:14px 24px 18px;border-top:1px solid var(--border);
    display:flex;gap:12px;align-items:center;flex-shrink:0;flex-wrap:wrap;
  }
  .exercise-footer .score{font-size:15px;font-weight:700;color:var(--sage);min-width:80px}
  .exercise-footer .ex-answer-btn{
    padding:9px 20px;border-radius:var(--radius-sm);
    font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
  }
  .btn-submit{background:var(--sage);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-submit:hover{background:var(--sage-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .btn-submit:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .btn-retry{background:var(--cream-light);color:var(--text-secondary);box-shadow:var(--shadow-sm)}
  .btn-retry:hover{background:var(--cream-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .exercise-empty{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--text-muted);gap:12px;font-size:14px;
  }
  .exercise-empty svg{width:48px;height:48px;opacity:.25;color:var(--umber)}

  /* ── Card Slide ── */
  .ex-card-slide{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 8px;overflow:hidden}
  .ex-card{
    width:100%;max-width:600px;min-height:240px;
    background:var(--cream-light);border:1px solid var(--border);
    border-radius:var(--radius);padding:36px 32px;
    box-shadow:var(--shadow-sm);
    transition:transform .35s cubic-bezier(.22,.61,.36,1),opacity .35s ease;
  }
  .ex-card.slide-left{transform:translateX(-40px);opacity:0}
  .ex-card.slide-right{transform:translateX(40px);opacity:0}

  /* ── Card Content ── */
  .ex-card .eq-num{margin-bottom:12px}
  .ex-card .eq-text{font-size:16px;line-height:1.8;color:var(--text)}
  .ex-card .blank-highlight{
    display:inline-block;min-width:80px;
    border-bottom:2px dashed var(--sage);color:var(--sage);
    font-weight:700;text-align:center;padding:0 6px;
  }
  .ex-card .ex-answer{
    margin-top:20px;padding:14px 16px;
    background:color-mix(in oklch,var(--sage) 8%,transparent);
    border-radius:var(--radius-sm);font-size:14px;line-height:1.6;
    display:none;color:var(--text-secondary);
  }
  .ex-card .ex-answer.show{display:block;animation:in .2s ease}
  .ex-card .ex-answer strong{color:var(--sage);font-weight:600}

  /* ── Nav ── */
  .exercise-footer{
    padding:14px 24px 18px;border-top:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;
  }
  .ex-nav{display:flex;align-items:center;gap:12px}
  .ex-arrow{
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--border);border-radius:50%;background:var(--surface);
    cursor:pointer;transition:all .15s;color:var(--text-secondary);
  }
  .ex-arrow:hover{background:var(--cream-light);color:var(--sage);border-color:var(--sage)}
  .ex-arrow:active{transform:scale(.93)}
  .ex-arrow svg{width:22px;height:22px}
  .ex-arrow:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
  .ex-progress{font-size:14px;font-weight:600;color:var(--text-secondary);min-width:50px;text-align:center}
  .ex-answer-btn{
    padding:8px 20px;border:1px solid var(--sage);border-radius:var(--radius-sm);
    background:transparent;color:var(--sage);font-size:13px;font-weight:500;
    cursor:pointer;transition:all .15s;
  }
  .ex-answer-btn:hover{background:var(--sage);color:#fff}
  .ex-answer-btn.revealed{background:var(--sage);color:#fff}

  /* ── Mode Toggle ── */
  .ex-mode-bar{
    display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);
    background:color-mix(in oklch,var(--cream) 50%,var(--cream-light));flex-shrink:0;
  }
  .ex-mode-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
    background:var(--surface);color:var(--text-muted);font-size:13px;font-weight:500;
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .ex-mode-btn svg{width:16px;height:16px;opacity:.6;transition:opacity .2s}
  .ex-mode-btn:hover{border-color:var(--sage);color:var(--sage)}
  .ex-mode-btn.active{
    background:color-mix(in oklch,var(--sage) 12%,var(--cream-light));
    border-color:var(--sage);color:var(--sage);font-weight:600;
    box-shadow:0 0 0 3px color-mix(in oklch,var(--sage) 10%,transparent);
  }
  .ex-mode-btn.active svg{opacity:1}
  .ex-mode-btn .mode-indicator{width:7px;height:7px;border-radius:50%;display:none}
  .ex-mode-btn.active .mode-indicator{display:inline-block;background:var(--sage)}
  .ex-mode-desc{
    font-size:12px;color:var(--text-muted);margin-left:auto;white-space:nowrap;
    animation:in .2s ease-out;padding-left:12px;border-left:1px solid var(--border);
    line-height:1.4;
  }
  .ex-mode-desc.hide{display:none}
  @media(max-width:1000px){.ex-mode-desc{font-size:11px;max-width:200px;white-space:normal}}

  /* ── Grading Input ── */
  .ex-card .ex-grading-area{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .ex-grading-row{display:flex;gap:8px;align-items:center}
  .ex-grading-row input{
    flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
    font-size:15px;outline:none;transition:border .2s,box-shadow .2s;
    background:var(--surface);color:var(--text);font-family:inherit;
  }
  .ex-grading-row input:focus{border-color:var(--sage);box-shadow:0 0 0 3px color-mix(in oklch,var(--sage) 12%,transparent)}
  .ex-grading-row input:disabled{opacity:.5;background:color-mix(in oklch,var(--cream) 40%,var(--surface))}
  .ex-grading-row input.correct{border-color:var(--success);background:color-mix(in oklch,var(--success) 6%,var(--surface))}
  .ex-grading-row input.wrong{border-color:var(--error);background:color-mix(in oklch,var(--error) 6%,var(--surface))}
  .ex-submit-btn{
    padding:10px 22px;border:none;border-radius:8px;
    background:var(--sage);color:#fff;font-size:14px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;
  }
  .ex-submit-btn:hover{background:var(--sage-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .ex-submit-btn:active{transform:translateY(0) scale(.97)}
  .ex-submit-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .ex-submit-btn.submitted{background:var(--cream-dark);color:var(--text-muted);cursor:default}
  .ex-submit-btn.submitted:hover{box-shadow:none;transform:none}

  .ex-result-badge{
    display:inline-flex;align-items:center;gap:5px;
    margin-top:10px;padding:6px 14px;border-radius:8px;
    font-size:13px;font-weight:600;animation:in .2s ease-out;
  }
  .ex-result-badge svg{width:15px;height:15px}
  .ex-result-badge.correct{
    background:color-mix(in oklch,var(--sage) 12%,transparent);
    color:color-mix(in oklch,var(--sage) 85%,#000);
  }
  .ex-result-badge.wrong{
    background:color-mix(in oklch,var(--error) 10%,transparent);
    color:var(--error);
  }
  .ex-result-badge .correct-ans{
    color:var(--text-muted);font-weight:400;margin-left:4px;
  }
  .ex-result-badge .correct-ans strong{color:var(--sage);font-weight:600}

  /* ── Results Panel ── */
  .ex-results{display:none;flex:1;overflow-y:auto;padding:24px;}
  .ex-results.show{display:block;animation:in .3s ease-out}
  .ex-score-hero{
    text-align:center;padding:32px 16px 28px;
    background:color-mix(in oklch,var(--cream-light) 60%,var(--surface));
    border-radius:var(--radius);border:1px solid var(--border);
    margin-bottom:20px;box-shadow:var(--shadow-sm);
  }
  .ex-score-ring{
    position:relative;display:inline-flex;align-items:center;justify-content:center;
    width:120px;height:120px;border-radius:50%;
    background:conic-gradient(var(--sage) var(--pct,0%), var(--cream-dark) var(--pct,0%));
    margin-bottom:12px;
  }
  .ex-score-ring-inner{
    width:96px;height:96px;border-radius:50%;
    background:var(--cream-light);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.04);
  }
  .ex-score-ring-inner .score-num{font-size:32px;font-weight:700;color:var(--sage);line-height:1}
  .ex-score-ring-inner .score-label{font-size:12px;color:var(--text-muted);margin-top:2px}
  .ex-score-stats{display:flex;justify-content:center;gap:32px;margin-top:8px}
  .ex-score-stat{text-align:center}
  .ex-score-stat .num{font-size:22px;font-weight:700}
  .ex-score-stat .num.correct{color:var(--sage)}
  .ex-score-stat .num.wrong{color:var(--error)}
  .ex-score-stat .label{font-size:11px;color:var(--text-muted);margin-top:2px}

  .ex-results-list{margin-bottom:20px}
  .ex-result-item{
    display:flex;align-items:flex-start;gap:10px;
    padding:12px 16px;border-radius:var(--radius-sm);
    margin-bottom:6px;border:1px solid var(--border);
    background:var(--cream-light);font-size:14px;line-height:1.5;
    animation:in .2s ease-out both;
  }
  .ex-result-item .r-icon{flex-shrink:0;margin-top:1px}
  .ex-result-item .r-icon svg{width:18px;height:18px}
  .ex-result-item .r-icon .check{color:var(--sage)}
  .ex-result-item .r-icon .cross{color:var(--error)}
  .ex-result-item .r-body{flex:1;min-width:0}
  .ex-result-item .r-q{color:var(--text);margin-bottom:2px}
  .ex-result-item .r-ans{font-size:12px;color:var(--text-muted)}
  .ex-result-item .r-ans strong{color:var(--sage);font-weight:600}
  .ex-result-item.wrong{border-left:3px solid var(--error)}
  .ex-result-item.correct{border-left:3px solid var(--sage)}

  .ex-results-actions{display:flex;gap:10px;justify-content:center;padding-bottom:8px}
  .ex-results-actions button{
    padding:10px 28px;border-radius:var(--radius-sm);
    font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;
  }
  .ex-results-actions .btn-primary{
    background:var(--sage);color:#fff;border:none;
    box-shadow:var(--shadow-sm);
  }
  .ex-results-actions .btn-primary:hover{background:var(--sage-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .ex-results-actions .btn-secondary{
    background:transparent;color:var(--text-secondary);
    border:1.5px solid var(--border);
  }
  .ex-results-actions .btn-secondary:hover{border-color:var(--sage);color:var(--sage)}

  /* ── Footer actions per mode ── */
  .ex-footer-right{display:flex;gap:8px;align-items:center;margin-left:auto}
  .ex-view-results-btn{
    padding:8px 20px;border:none;border-radius:var(--radius-sm);
    background:var(--sage);color:#fff;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;font-family:inherit;display:none;
  }
  .ex-view-results-btn:hover{background:var(--sage-dark);box-shadow:var(--shadow-raise);transform:translateY(-1px)}
  .ex-view-results-btn.show{display:inline-flex;animation:in .2s ease-out}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      穹途末路
    </div>
    <nav class="sidebar-nav">
      <button class="active" data-panel="chat" onclick="switchPanel('chat')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        对话
      </button>
      <button data-panel="exercise" onclick="switchPanel('exercise')">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        习题
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="dot-wrap">
        <span class="dot" id="statusDot"></span>
        <span id="statusText" style="font-size:11px">连接中...</span>
      </div>
      穹途末路
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="panels">

      <!-- Chat Panel -->
      <div class="panel active" id="panel-chat" style="display:flex;flex-direction:column">
        <div class="chat-header">
          <h1>
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
            穹途末路
          </h1>
          <span class="meta">搜索 · 习题 · 下载</span>
        </div>
        <div class="messages" id="messages">
          <div class="msg bot">
            <div class="bubble">你好！需要找什么资料？<br><br>
            • 搜一下微积分的资料<br>
            • 生成线代填空题<br>
            • 打包下载概率论资料</div>
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="input" placeholder="输入你想搜索的内容…" autofocus>
          <button id="sendBtn">发送</button>
        </div>
        <div class="chat-hint">Enter 发送 · 试试「生成练习题」</div>
      </div>

      <!-- Exercise Panel -->
      <div class="panel" id="panel-exercise">
        <div class="exercise-area">
          <div class="exercise-header">
            <h2>
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span id="ex-title">填空题</span>
            </h2>
            <div class="src" id="ex-source"></div>
            <div class="ex-mode-bar" id="ex-mode-bar">
              <button class="ex-mode-btn active" data-mode="review" onclick="switchExerciseMode('review')">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
                <span class="mode-indicator"></span>
                复习模式
              </button>
              <button class="ex-mode-btn" data-mode="grading" onclick="switchExerciseMode('grading')">
                <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
                <span class="mode-indicator"></span>
                批改模式
              </button>
              <span class="ex-mode-desc" id="ex-mode-desc">批改模式：根据你的答题情况会指定相应的复习计划</span>
            </div>
          </div>
          <div class="exercise-body" id="ex-body">
            <div class="exercise-empty" id="ex-empty">
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <div>在对话中输入「生成练习题」</div>
            </div>
            <div id="ex-questions" style="display:none;">
              <div class="ex-card-slide" id="ex-card-wrap">
                <div class="ex-card" id="ex-card"></div>
              </div>
            </div>
            <div class="ex-results" id="ex-results"></div>
          </div>
          <div class="exercise-footer" id="ex-footer" style="display:none;">
            <div class="ex-nav">
              <button class="ex-arrow" id="ex-prev" onclick="prevQuestion()">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <span class="ex-progress" id="ex-progress">1 / 10</span>
              <button class="ex-arrow" id="ex-next" onclick="nextQuestion()">
                <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
            <div class="ex-footer-right">
              <button class="ex-view-results-btn" id="ex-view-results-btn" onclick="showResults()">📊 查看结果</button>
              <button class="ex-answer-btn" id="ex-answer-btn" onclick="toggleAnswer()">显示答案</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
const messages=document.getElementById('messages');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
let ws=null;

// WebSocket
function connect(){
  if(location.protocol==='file:'){
    document.getElementById('messages').innerHTML=
      '<div class="msg bot"><div class="bubble" style="background:color-mix(in oklch,var(--error) 10%,var(--cream-light));color:var(--error)">'+
      '请先运行 <b>start.bat</b> 启动服务<br>然后访问 http://127.0.0.1:8000</div></div>';
    return;
  }
  const p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(p+'//'+location.host+'/ws');
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='exercise'){
      removeLoading();
      if(d.reply)addMsg('bot',d.reply);
      renderExercise(d);
      switchPanel('exercise')
    }else{removeLoading();addMsg('bot',d.reply)}
  };
  ws.onerror=()=>{
    document.getElementById('messages').innerHTML=
      '<div class="msg bot"><div class="bubble" style="background:color-mix(in oklch,var(--error) 10%,var(--cream-light));color:var(--error)">'+
      '无法连接服务器<br>请确认已运行 <b>start.bat</b></div></div>';
    setStatus('off','离线');
  };
  ws.onopen=()=>setStatus('on','运行中');
  ws.onclose=()=>{setStatus('off','已断开');setTimeout(connect,2000)};
}
connect();

function setStatus(state,label){
  const dot=document.getElementById('statusDot');
  const txt=document.getElementById('statusText');
  dot.className='dot'+(state==='on'?'':' off');
  dot.style.background=state==='on'?'var(--sage)':'var(--error)';
  txt.textContent=label;
}

function switchPanel(name){
  document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.toggle('active',b.dataset.panel===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));
  if(name==='chat')input.focus();
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function linkify(t){
  let h=escapeHtml(t);
  h=h.replace(/\[([^\]]+)\]\(\/files\/(.+)\)/g,(_,t,fp)=>{
    const icon='<svg viewBox="0 0 24 24" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    return '<a href="/files/'+escapeHtml(fp)+'" download style="display:inline-flex;align-items:center;gap:4px;margin:4px 0;padding:6px 14px;background:var(--sage);color:#fff;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600">'+icon+escapeHtml(t)+'</a>';
  });
  h=h.replace(/\/files\/[^\s<"']+/g,m=>{
    let c=m;const pc=(c.match(/\(/g)||[]).length,cc=(c.match(/\)/g)||[]).length;
    if(cc>pc)c=c.replace(/\)+$/,'');
    const fn=c.replace('/files/','').split('/').pop().replace(/^.*[/\\]/,'');
    const icon='<svg viewBox="0 0 24 24" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    return '<a href="'+c+'" download style="display:inline-flex;align-items:center;gap:4px;margin:4px 0;padding:6px 14px;background:var(--sage);color:#fff;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600">'+icon+escapeHtml(fn)+'</a>';
  });
  return h;
}

function addMsg(r,t){
  const d=document.createElement('div');d.className='msg '+r;
  const b=document.createElement('div');b.className='bubble';b.innerHTML=linkify(t);
  d.appendChild(b);messages.appendChild(d);messages.scrollTop=messages.scrollHeight;
  if(typeof renderMathInElement==='function'){
    renderMathInElement(b,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}]});
  }
}
function removeLoading(){const l=messages.querySelector('.msg.bot:last-child .bubble.loading');if(l)l.closest('.msg').remove()}
function send(){
  const t=input.value.trim();if(!t)return;
  input.value='';addMsg('user',t);addMsg('bot','…');sendBtn.disabled=true;
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({query:t}));
}
input.addEventListener('keydown',e=>{if(e.key==='Enter')send()});
sendBtn.addEventListener('click',send);

// ═══ Exercise: Card-based with dual-mode (Review / Grading) ═══
let currentQuestions=[];
let exIndex=0;
let exMode='review'; // 'review' | 'grading'
let answered=[];

// Wrap raw LaTeX commands in KaTeX delimiters
function wrapMath(s){
  // 1) Display math: \begin{env}...\end{env} → $$...$$
  s=s.replace(/\\begin\{(\w+)\}([\s\S]*?)\\end\{\1\}/g,(m)=>'$$'+m+'$$');
  // 2) Backslash commands not already inside $...$: wrap in inline $...$
  s=s.replace(/(?<!\$)(\\[a-zA-Z]+(?:\{[^}]*\})?)/g,(m)=>'$'+m+'$');
  // Clean double wrapping
  s=s.replace(/\$\$(\$[^$]+\$)\$\$/g,'$1');
  s=s.replace(/\$\$(\$[^$]+\$)\$\$/g,'$1');
  // Fix cases where empty/trivial inline math was created
  s=s.replace(/\$\\[a-zA-Z]{1,2}\$/g,(m)=>{
    const cmd=m.slice(1,-1);
    if(['\\n','\\t','\\r','\\ ','\\\n'].includes(cmd))return cmd;
    return m;
  });
  return s;
}

function renderExercise(d){
  currentQuestions=(d.questions||[]).map((q,i)=>({id:q.id||i+1,question:q.question,answer:q.answer}));
  answered=[];
  exIndex=0;
  document.getElementById('ex-title').textContent=d.title||'填空题';
  document.getElementById('ex-source').textContent=d.source?'来源: '+d.source:'';
  document.getElementById('ex-empty').style.display='none';
  document.getElementById('ex-questions').style.display='block';
  document.getElementById('ex-results').classList.remove('show');
  document.getElementById('ex-footer').style.display='flex';
  document.getElementById('ex-mode-bar').style.display='flex';
  document.getElementById('ex-answer-btn').style.display='';
  document.getElementById('ex-view-results-btn').classList.remove('show');
  exMode='review';
  document.querySelectorAll('.ex-mode-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode==='review');
  });
  const desc=document.getElementById('ex-mode-desc');
  if(desc)desc.classList.add('hide');
  renderCard();
}

function renderCard(){
  if(!currentQuestions.length)return;
  const q=currentQuestions[exIndex];
  const card=document.getElementById('ex-card');
  const total=currentQuestions.length;
  const processedQuestion=wrapMath(q.question);
  const parts=processedQuestion.split('______');
  let textHtml='';
  parts.forEach((p,i)=>{
    textHtml+=escapeHtml(p);
    if(i<parts.length-1)textHtml+='<span class="blank-highlight">______</span>';
  });
  const answeredInfo=answered.find(a=>a.idx===exIndex);

  if(exMode==='review'){
    card.innerHTML=
      '<div class="ex-card-inner">'+
        '<div class="eq-text"><span class="eq-num">'+(exIndex+1)+'</span>'+textHtml+'</div>'+
        '<div class="ex-answer" id="ex-answer-box">'+
          '<strong>答案：</strong>'+escapeHtml(q.answer)+
        '</div>'+
      '</div>';
    document.getElementById('ex-answer-box').classList.remove('show');
    document.getElementById('ex-answer-btn').className='ex-answer-btn';
    document.getElementById('ex-answer-btn').textContent='显示答案';
    document.getElementById('ex-answer-btn').style.display='';
  } else {
    const isSubmitted=answeredInfo!==undefined;
    const inputClass=isSubmitted?(answeredInfo.correct?'correct':'wrong'):'';
    const submitDisabled=isSubmitted?'disabled':'';
    const submitText=isSubmitted?'已批阅':'提交';
    const inputDisabled=isSubmitted?'disabled':'';
    const inputValue=isSubmitted?escapeHtml(answeredInfo.userAnswer):'';
    let resultHtml='';
    if(isSubmitted){
      if(answeredInfo.correct){
        resultHtml='<div class="ex-result-badge correct">'+
          '<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '✓ 正确！</div>';
      } else {
        resultHtml='<div class="ex-result-badge wrong">'+
          '<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '✗ 错误，正确答案：<span class="correct-ans"><strong>'+escapeHtml(q.answer)+'</strong></span></div>';
      }
    }
    card.innerHTML=
      '<div class="ex-card-inner">'+
        '<div class="eq-text"><span class="eq-num">'+(exIndex+1)+'</span>'+textHtml+'</div>'+
        '<div class="ex-grading-area">'+
          '<div class="ex-grading-row">'+
            '<input type="text" id="ex-grade-input" class="'+inputClass+'" placeholder="输入你的答案…" '+
              'value="'+inputValue+'" '+inputDisabled+' onkeydown="if(event.key===\"Enter\"&&!this.disabled)submitAnswer()">'+
            '<button class="ex-submit-btn '+submitText+'" id="ex-submit-btn" '+submitDisabled+' onclick="submitAnswer()">'+submitText+'</button>'+
          '</div>'+
          resultHtml+
        '</div>'+
      '</div>';
    document.getElementById('ex-answer-btn').style.display='none';
    if(!isSubmitted){
      setTimeout(()=>{
        const inp=document.getElementById('ex-grade-input');
        if(inp)inp.focus();
      },250);
    }
  }
  document.getElementById('ex-progress').textContent=(exIndex+1)+' / '+total;
  document.getElementById('ex-prev').disabled=(exIndex===0);
  document.getElementById('ex-next').disabled=(exIndex===total-1);
  if(exMode==='grading'){
    const allDone=currentQuestions.every((_,i)=>answered.some(a=>a.idx===i));
    document.getElementById('ex-view-results-btn').classList.toggle('show',allDone);
  }
  if(typeof renderMathInElement==='function'){
    renderMathInElement(card,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}]});
  }
}

function nextQuestion(){
  if(document.getElementById('ex-results').classList.contains('show'))return;
  if(exIndex>=currentQuestions.length-1)return;
  const card=document.getElementById('ex-card');
  card.classList.add('slide-left');
  setTimeout(()=>{
    card.classList.remove('slide-left');
    exIndex++;
    renderCard();
  },200);
}

function prevQuestion(){
  if(document.getElementById('ex-results').classList.contains('show'))return;
  if(exIndex<=0)return;
  const card=document.getElementById('ex-card');
  card.classList.add('slide-right');
  setTimeout(()=>{
    card.classList.remove('slide-right');
    exIndex--;
    renderCard();
  },200);
}

function toggleAnswer(){
  const box=document.getElementById('ex-answer-box');
  const btn=document.getElementById('ex-answer-btn');
  if(!box)return;
  const show=!box.classList.contains('show');
  box.classList.toggle('show',show);
  btn.textContent=show?'隐藏答案':'显示答案';
  btn.classList.toggle('revealed',show);
}

function switchExerciseMode(mode){
  if(mode===exMode)return;
  exMode=mode;
  document.querySelectorAll('.ex-mode-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===mode);
  });
  const desc=document.getElementById('ex-mode-desc');
  if(desc)desc.classList.toggle('hide',mode!=='grading');
  if(mode==='grading'){
    answered=[];
    document.getElementById('ex-view-results-btn').classList.remove('show');
    document.getElementById('ex-results').classList.remove('show');
    document.getElementById('ex-questions').style.display='block';
  }
  if(mode==='review'){
    document.getElementById('ex-results').classList.remove('show');
    document.getElementById('ex-questions').style.display='block';
  }
  renderCard();
}

function submitAnswer(){
  const input=document.getElementById('ex-grade-input');
  const btn=document.getElementById('ex-submit-btn');
  if(!input||input.disabled)return;
  const userAnswer=input.value.trim();
  if(!userAnswer){
    input.focus();
    input.style.borderColor='var(--error)';
    setTimeout(()=>{input.style.borderColor=''},600);
    return;
  }
  const q=currentQuestions[exIndex];
  const correct=normalizeAnswer(userAnswer)===normalizeAnswer(q.answer);
  answered.push({idx:exIndex,userAnswer,correct});
  renderCard();
}

function normalizeAnswer(s){
  return s.replace(/\s+/g,'').toLowerCase()
          .replace(/[，。,．、！？：；（）【】《》""''「」『』]/g,'')
          .replace(/[\u00a0\u3000]/g,'');
}

function showResults(){
  if(!currentQuestions.length)return;
  const total=currentQuestions.length;
  const correctCount=answered.filter(a=>a.correct).length;
  const pct=Math.round((correctCount/total)*100);
  document.getElementById('ex-questions').style.display='none';
  document.getElementById('ex-results').classList.add('show');
  document.getElementById('ex-answer-btn').style.display='none';
  document.getElementById('ex-view-results-btn').classList.remove('show');
  document.getElementById('ex-mode-bar').style.display='none';
  const resultsEl=document.getElementById('ex-results');
  let itemsHtml='';
  currentQuestions.forEach((q,i)=>{
    const a=answered.find(a=>a.idx===i);
    const isCorrect=a?a.correct:false;
    const icon=isCorrect
      ? '<svg class="check" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '<svg class="cross" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const cls=isCorrect?'correct':'wrong';
    const delay=60*i;
    const processedQ=wrapMath(q.question);
    const parts=processedQ.split('______');
    let qShort=parts.join('____');
    if(qShort.length>60)qShort=qShort.slice(0,58)+'…';
    itemsHtml+=
      '<div class="ex-result-item '+cls+'" style="animation-delay:'+delay+'ms">'+
        '<div class="r-icon">'+icon+'</div>'+
        '<div class="r-body">'+
          '<div class="r-q">'+(i+1)+'. '+escapeHtml(qShort)+'</div>'+
          '<div class="r-ans">'+
            (a?'你的答案：'+escapeHtml(a.userAnswer)+' · ':'')+
            '<strong>正确答案：'+escapeHtml(q.answer)+'</strong>'+
          '</div>'+
        '</div>'+
      '</div>';
  });
  resultsEl.innerHTML=
    '<div class="ex-score-hero">'+
      '<div class="ex-score-ring" style="--pct:'+pct+'%">'+
        '<div class="ex-score-ring-inner">'+
          '<div class="score-num">'+pct+'%</div>'+
          '<div class="score-label">正确率</div>'+
        '</div>'+
      '</div>'+
      '<div class="ex-score-stats">'+
        '<div class="ex-score-stat"><div class="num correct">'+correctCount+'</div><div class="label">正确</div></div>'+
        '<div class="ex-score-stat"><div class="num wrong">'+(total-correctCount)+'</div><div class="label">错误</div></div>'+
        '<div class="ex-score-stat"><div class="num" style="color:var(--text-secondary)">'+total+'</div><div class="label">总计</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="ex-results-list">'+itemsHtml+'</div>'+
    '<div class="ex-results-actions">'+
      '<button class="btn-primary" onclick="switchExerciseMode(\'review\')">📖 复习模式</button>'+
      '<button class="btn-secondary" onclick="switchExerciseMode(\'grading\')">🔄 重做批改</button>'+
    '</div>';
}</script>
</body>
</html>
